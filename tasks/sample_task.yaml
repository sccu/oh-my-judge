task_id: "COUPANG_001"
name: "쿠팡 상품 검색 및 최저가 확인"
description: "쿠팡 메인에서 '노트북'을 검색하고, 첫 번째 페이지에 나오는 상품들의 가격이 100만원 이상인지 확인한다."
max_score: 10
action:
  type: "SEARCH_AND_EXTRACT"
  params:
    url: "https://www.coupang.com"
    keyword: "노트북"
grading_guidelines:
  - criteria: "검색 결과 페이지가 정상적으로 로드되었는가?"
    weight: 0.3
  - criteria: "검색어와 연관된 상품 리스트가 보이는가?"
    weight: 0.4
  - criteria: "각 상품의 가격 정보가 올바르게 추출되었는가?"
    weight: 0.3
validation_logic:
  - type: "LLM_JUDGE"
    prompt: "수집된 스크린샷과 DOM 정보를 바탕으로, 검색 결과가 올바른지 판단하세요."
